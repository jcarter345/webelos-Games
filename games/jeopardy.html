<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jeopardy - Cub Scouts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; background: #070720; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="../data/jeopardy-themes.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Helpers ──────────────────────────────────────────────────────────

// Pick one question at random from each value-level pool.
// Called at the start of every new game so the board varies each time.
function pickQuestions(categories) {
  return categories.map((cat) => ({
    ...cat,
    questions: cat.questions.map((q) => ({
      value: q.value,
      ...q.pool[Math.floor(Math.random() * q.pool.length)],
    })),
  }));
}

// Dynamically load a theme's question JS file and return a promise
// that resolves to the question array (the global variable it creates).
function loadThemeData(theme) {
  return new Promise((resolve, reject) => {
    // Already loaded in a previous round?
    if (window[theme.dataVar]) { resolve(window[theme.dataVar]); return; }
    const script = document.createElement("script");
    script.src = "../data/" + theme.dataFile;
    script.onload = () => {
      if (window[theme.dataVar]) resolve(window[theme.dataVar]);
      else reject(new Error("Data variable " + theme.dataVar + " not found after loading " + theme.dataFile));
    };
    script.onerror = () => reject(new Error("Failed to load " + theme.dataFile));
    document.head.appendChild(script);
  });
}

// Read ?theme=<id> query param for direct-linking.
function getThemeFromURL() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("theme");
  if (!id) return null;
  return JEOPARDY_THEMES.find((t) => t.id === id) || null;
}

const TEAM_COLORS = ["#e94560", "#0ea5e9", "#22c55e", "#f59e0b", "#a78bfa", "#ec4899"];

// ── ThemePicker ─────────────────────────────────────────────────────

function ThemePicker({ onSelect }) {
  const [loading, setLoading] = useState(false);
  const [loadError, setLoadError] = useState(null);
  const [pendingTheme, setPendingTheme] = useState(null);

  const handlePick = (theme) => {
    setLoading(true);
    setLoadError(null);
    setPendingTheme(theme);
    loadThemeData(theme).then((data) => {
      onSelect(theme, data);
    }).catch((err) => {
      setLoading(false);
      setLoadError("Could not load questions. Check your connection and try again.");
    });
  };

  // Auto-select if ?theme=<id> is present
  useEffect(() => {
    const urlTheme = getThemeFromURL();
    if (urlTheme) handlePick(urlTheme);
  }, []);

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(145deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%)", padding: 20 }}>
      <div style={{ textAlign: "center", marginBottom: "clamp(24px, 5vw, 40px)" }}>
        <div style={{ fontSize: "clamp(36px, 6vw, 48px)", marginBottom: 8 }}>⚜️</div>
        <h1 style={{ fontSize: "clamp(22px, 4vw, 36px)", fontWeight: 900, color: "#f8fafc", margin: 0, letterSpacing: 2, textTransform: "uppercase" }}>Jeopardy</h1>
        <p style={{ color: "#94a3b8", fontSize: "clamp(13px, 2vw, 16px)", marginTop: 8, letterSpacing: 1 }}>PICK YOUR ADVENTURE</p>
      </div>

      {loading ? (
        <div style={{ color: "#94a3b8", fontSize: "clamp(15px, 2vw, 18px)" }}>Loading questions...</div>
      ) : loadError ? (
        <div style={{ textAlign: "center", maxWidth: 360, width: "100%" }}>
          <div style={{ color: "#ef4444", fontSize: "clamp(14px, 2vw, 16px)", marginBottom: 20, lineHeight: 1.6 }}>{loadError}</div>
          <button onClick={() => handlePick(pendingTheme)} style={{ padding: "12px 32px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #f59e0b, #ef4444)", color: "#fff", fontWeight: 800, fontSize: "clamp(14px, 2vw, 17px)", cursor: "pointer", letterSpacing: 1 }}>Try Again</button>
          <button onClick={() => { setLoadError(null); setPendingTheme(null); }} style={{ display: "block", margin: "12px auto 0", padding: "10px 24px", borderRadius: 10, border: "2px solid rgba(255,255,255,0.2)", background: "transparent", color: "#94a3b8", fontWeight: 700, fontSize: "clamp(13px, 1.8vw, 16px)", cursor: "pointer" }}>Back to Themes</button>
        </div>
      ) : (
        <div style={{ display: "flex", gap: 20, flexWrap: "wrap", justifyContent: "center", maxWidth: 700, width: "100%" }}>
          {JEOPARDY_THEMES.map((theme) => (
            <button key={theme.id} onClick={() => handlePick(theme)}
              style={{ background: "rgba(255,255,255,0.05)", borderRadius: 16, padding: "clamp(20px, 4vw, 32px) clamp(18px, 3vw, 28px)", width: "min(300px, 100%)", border: "2px solid rgba(255,255,255,0.1)", cursor: "pointer", textAlign: "left", transition: "all 0.2s", display: "flex", flexDirection: "column", gap: 12 }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#f59e0b"; e.currentTarget.style.background = "rgba(245,158,11,0.06)"; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"; e.currentTarget.style.background = "rgba(255,255,255,0.05)"; }}>
              <div style={{ fontSize: "clamp(30px, 5vw, 40px)" }}>{theme.emoji}</div>
              <div style={{ color: "#f8fafc", fontWeight: 800, fontSize: "clamp(16px, 2.5vw, 20px)", lineHeight: 1.3 }}>{theme.name}</div>
              <div style={{ color: "#94a3b8", fontSize: "clamp(14px, 2vw, 16px)", lineHeight: 1.6 }}>{theme.description}</div>
              <div style={{ marginTop: 8, color: "#f59e0b", fontWeight: 700, fontSize: "clamp(13px, 1.8vw, 15px)", textTransform: "uppercase", letterSpacing: 1 }}>Play →</div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ── ConfettiEffect ──────────────────────────────────────────────────

function ConfettiEffect() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const particles = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: TEAM_COLORS[Math.floor(Math.random() * 6)],
      vy: Math.random() * 3 + 2,
      vx: (Math.random() - 0.5) * 2,
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 8,
    }));
    let frame;
    const animate = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p) => {
        p.y += p.vy; p.x += p.vx; p.rot += p.rv;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((p.rot * Math.PI) / 180);
        ctx.fillStyle = p.color; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
      });
      if (particles.some((p) => p.y < canvas.height + 50)) frame = requestAnimationFrame(animate);
    };
    animate();
    return () => cancelAnimationFrame(frame);
  }, []);
  return React.createElement("canvas", { ref: canvasRef, style: { position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 999 } });
}

// ── TeamSetup ───────────────────────────────────────────────────────

function TeamSetup({ theme, onStart }) {
  const [numTeams, setNumTeams] = useState(2);
  const [names, setNames] = useState(["Den 1", "Den 2"]);
  const handleNumChange = (n) => {
    setNumTeams(n);
    setNames((prev) => {
      const newNames = [...prev];
      while (newNames.length < n) newNames.push("Team " + (newNames.length + 1));
      return newNames.slice(0, n);
    });
  };
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(145deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%)", padding: 20 }}>
      <div style={{ textAlign: "center", marginBottom: "clamp(24px, 5vw, 40px)" }}>
        <div style={{ fontSize: "clamp(36px, 6vw, 48px)", marginBottom: 8 }}>{theme.emoji}</div>
        <h1 style={{ fontSize: "clamp(24px, 5vw, 36px)", fontWeight: 900, color: "#f8fafc", margin: 0, letterSpacing: 2, textTransform: "uppercase" }}>{theme.name} Jeopardy</h1>
        <p style={{ color: "#94a3b8", fontSize: "clamp(13px, 2vw, 16px)", marginTop: 8, letterSpacing: 1 }}>{theme.name.toUpperCase()} ADVENTURE</p>
      </div>
      <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 16, padding: "clamp(20px, 4vw, 32px)", maxWidth: 420, width: "100%", border: "1px solid rgba(255,255,255,0.1)" }}>
        <label style={{ color: "#94a3b8", fontSize: "clamp(13px, 1.8vw, 15px)", textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 12 }}>Number of Teams</label>
        <div style={{ display: "flex", gap: 8, marginBottom: 28 }}>
          {[2, 3, 4, 5, 6].map((n) => (
            <button key={n} onClick={() => handleNumChange(n)} style={{ flex: 1, padding: "10px 0", borderRadius: 8, border: numTeams === n ? "2px solid #f59e0b" : "2px solid rgba(255,255,255,0.1)", background: numTeams === n ? "rgba(245,158,11,0.15)" : "transparent", color: numTeams === n ? "#f59e0b" : "#64748b", fontWeight: 700, fontSize: "clamp(16px, 2.5vw, 20px)", cursor: "pointer" }}>{n}</button>
          ))}
        </div>
        {names.slice(0, numTeams).map((name, i) => (
          <div key={i} style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <div style={{ width: 12, height: 12, borderRadius: "50%", background: TEAM_COLORS[i] }} />
              <label style={{ color: "#94a3b8", fontSize: "clamp(12px, 1.6vw, 14px)", textTransform: "uppercase", letterSpacing: 1 }}>Team {i + 1}</label>
            </div>
            <input value={name} onChange={(e) => { const n = [...names]; n[i] = e.target.value; setNames(n); }} style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.05)", color: "#f8fafc", fontSize: "clamp(15px, 2vw, 18px)", fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
          </div>
        ))}
        <button onClick={() => onStart(names.slice(0, numTeams))} style={{ width: "100%", marginTop: 20, padding: "14px 0", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #f59e0b, #ef4444)", color: "#fff", fontWeight: 800, fontSize: "clamp(16px, 2.5vw, 20px)", cursor: "pointer", letterSpacing: 1, textTransform: "uppercase" }}>Start Game 🎯</button>
      </div>
    </div>
  );
}

// ── QuestionModal ───────────────────────────────────────────────────

function QuestionModal({ category, questionData, onCorrect, onWrong, onClose, teams, activeTeam }) {
  const [phase, setPhase] = useState("answer");
  const [showHint, setShowHint] = useState(false);
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.85)", backdropFilter: "blur(8px)", padding: 20 }} onClick={(e) => { if (e.target === e.currentTarget && phase === "result") onClose(); }}>
      <div style={{ background: "linear-gradient(160deg, " + category.color + ", #0a0a1a)", borderRadius: 20, padding: "clamp(24px, 5vw, 40px)", maxWidth: 600, width: "100%", border: "2px solid " + category.accent + "40", position: "relative", boxShadow: "0 0 60px " + category.accent + "20" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: "clamp(20px, 3vw, 24px)" }}>{category.emoji}</span>
            <span style={{ color: category.accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, fontSize: "clamp(13px, 2vw, 16px)" }}>{category.name}</span>
          </div>
          <span style={{ background: category.accent + "25", color: category.accent, padding: "4px 14px", borderRadius: 20, fontWeight: 800, fontSize: "clamp(16px, 2.5vw, 20px)" }}>${questionData.value}</span>
        </div>

        {phase === "answer" && (
          <div>
            <div style={{ color: "#e2e8f0", fontSize: "clamp(13px, 2vw, 16px)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, opacity: 0.6 }}>The Answer Is...</div>
            <div style={{ color: "#f8fafc", fontSize: "clamp(20px, 3.5vw, 28px)", fontWeight: 700, lineHeight: 1.5, marginBottom: 32 }}>{questionData.answer}</div>
            {showHint && (
              <div style={{ background: "rgba(245,158,11,0.1)", border: "1px solid rgba(245,158,11,0.3)", borderRadius: 10, padding: "12px 16px", marginBottom: 24 }}>
                <span style={{ color: "#f59e0b", fontWeight: 600, fontSize: "clamp(13px, 1.8vw, 15px)" }}>💡 HINT: </span>
                <span style={{ color: "#fbbf24", fontSize: "clamp(14px, 2vw, 16px)" }}>{questionData.hint}</span>
              </div>
            )}
            <div style={{ display: "flex", gap: 10 }}>
              {!showHint && <button onClick={() => setShowHint(true)} style={{ flex: 1, padding: "12px 0", borderRadius: 10, border: "1px solid rgba(245,158,11,0.4)", background: "transparent", color: "#f59e0b", fontWeight: 700, fontSize: "clamp(14px, 2vw, 16px)", cursor: "pointer" }}>💡 Show Hint</button>}
              <button onClick={() => setPhase("question")} style={{ flex: 2, padding: "12px 0", borderRadius: 10, border: "none", background: category.accent, color: "#fff", fontWeight: 800, fontSize: "clamp(14px, 2vw, 17px)", cursor: "pointer", letterSpacing: 0.5 }}>Reveal the Question ▶</button>
            </div>
          </div>
        )}

        {phase === "question" && (
          <div>
            <div style={{ color: "#e2e8f0", fontSize: "clamp(13px, 2vw, 16px)", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, opacity: 0.6 }}>The Correct Question Is...</div>
            <div style={{ color: "#4ade80", fontSize: "clamp(18px, 3vw, 24px)", fontWeight: 700, lineHeight: 1.5, marginBottom: 16, padding: "16px 20px", background: "rgba(74,222,128,0.08)", borderRadius: 12, borderLeft: "4px solid #4ade80" }}>{questionData.question}</div>
            <div style={{ color: "#94a3b8", fontSize: "clamp(14px, 2vw, 16px)", marginBottom: 20, textAlign: "center" }}>Answering: <strong style={{ color: TEAM_COLORS[activeTeam] }}>{teams[activeTeam]}</strong></div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { onWrong(); setPhase("result"); }} style={{ flex: 1, padding: "14px 0", borderRadius: 10, border: "2px solid #ef444480", background: "rgba(239,68,68,0.1)", color: "#ef4444", fontWeight: 800, fontSize: "clamp(14px, 2vw, 17px)", cursor: "pointer" }}>✕ Incorrect</button>
              <button onClick={() => { onCorrect(); setPhase("result"); }} style={{ flex: 1, padding: "14px 0", borderRadius: 10, border: "none", background: "#22c55e", color: "#fff", fontWeight: 800, fontSize: "clamp(14px, 2vw, 17px)", cursor: "pointer" }}>✓ Correct!</button>
            </div>
          </div>
        )}

        {phase === "result" && (
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: "clamp(36px, 6vw, 48px)", marginBottom: 12 }}>👍</div>
            <div style={{ color: "#f8fafc", fontSize: "clamp(18px, 3vw, 22px)", fontWeight: 700, marginBottom: 24 }}>Score Updated!</div>
            <button onClick={onClose} style={{ padding: "12px 40px", borderRadius: 10, border: "none", background: category.accent, color: "#fff", fontWeight: 700, fontSize: "clamp(14px, 2vw, 17px)", cursor: "pointer" }}>Back to Board</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App ─────────────────────────────────────────────────────────────

function App() {
  const [gameState, setGameState] = useState("theme-select");
  const [theme, setTheme] = useState(null);
  const [questionBank, setQuestionBank] = useState(null);
  const [categories, setCategories] = useState([]);
  const [teams, setTeams] = useState([]);
  const [scores, setScores] = useState([]);
  const [answered, setAnswered] = useState(new Set());
  const [activeQuestion, setActiveQuestion] = useState(null);
  const [activeTeam, setActiveTeam] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const totalQuestions = categories.reduce((sum, c) => sum + c.questions.length, 0);

  const handleThemeSelect = (selectedTheme, data) => {
    setTheme(selectedTheme);
    setQuestionBank(data);
    setCategories(pickQuestions(data));
    document.title = selectedTheme.name + " Jeopardy - Cub Scouts";
    setGameState("setup");
  };

  const startGame = (teamNames) => { setCategories(pickQuestions(questionBank)); setTeams(teamNames); setScores(new Array(teamNames.length).fill(0)); setGameState("playing"); };
  const handleCorrect = () => { const s = [...scores]; s[activeTeam] += activeQuestion.questionData.value; setScores(s); };
  const handleWrong = () => {};
  const handleClose = () => {
    const key = activeQuestion.catIdx + "-" + activeQuestion.qIdx;
    const na = new Set(answered); na.add(key); setAnswered(na); setActiveQuestion(null);
    setActiveTeam((prev) => (prev + 1) % teams.length);
    if (na.size === totalQuestions) { setGameState("finished"); setShowConfetti(true); }
  };

  if (gameState === "theme-select") return <ThemePicker onSelect={handleThemeSelect} />;
  if (gameState === "setup") return <TeamSetup theme={theme} onStart={startGame} />;

  if (gameState === "finished") {
    const maxScore = Math.max(...scores);
    const winners = teams.filter((_, i) => scores[i] === maxScore);
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(145deg, #0a0a1a 0%, #1a1a3e 50%, #0a0a1a 100%)", padding: 20 }}>
        {showConfetti && <ConfettiEffect />}
        <div style={{ fontSize: "clamp(48px, 8vw, 64px)", marginBottom: 16 }}>🏆</div>
        <h1 style={{ color: "#f8fafc", fontSize: "clamp(26px, 5vw, 36px)", fontWeight: 900, margin: "0 0 8px 0", textAlign: "center" }}>Game Over!</h1>
        <p style={{ color: "#f59e0b", fontSize: "clamp(18px, 3vw, 22px)", fontWeight: 700, marginBottom: 32 }}>{winners.length === 1 ? winners[0] + " Wins!" : "It's a tie!"}</p>
        <div style={{ display: "flex", gap: 16, flexWrap: "wrap", justifyContent: "center", marginBottom: 32 }}>
          {teams.map((name, i) => (
            <div key={i} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "clamp(14px, 3vw, 20px) clamp(20px, 4vw, 32px)", textAlign: "center", border: scores[i] === maxScore ? "2px solid " + TEAM_COLORS[i] : "1px solid rgba(255,255,255,0.1)" }}>
              <div style={{ color: TEAM_COLORS[i], fontWeight: 800, fontSize: "clamp(16px, 2.5vw, 20px)", marginBottom: 4 }}>{name}</div>
              <div style={{ color: "#f8fafc", fontWeight: 900, fontSize: "clamp(24px, 4vw, 36px)" }}>${scores[i]}</div>
              {scores[i] === maxScore && <div style={{ marginTop: 4, fontSize: "clamp(18px, 3vw, 22px)" }}>🥇</div>}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center" }}>
          <button onClick={() => { setCategories(pickQuestions(questionBank)); setGameState("setup"); setAnswered(new Set()); setActiveTeam(0); setShowConfetti(false); }} style={{ padding: "14px 36px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #f59e0b, #ef4444)", color: "#fff", fontWeight: 800, fontSize: "clamp(15px, 2vw, 18px)", cursor: "pointer", letterSpacing: 1 }}>Play Again</button>
          <button onClick={() => { setGameState("theme-select"); setTheme(null); setQuestionBank(null); setCategories([]); setTeams([]); setScores([]); setAnswered(new Set()); setActiveTeam(0); setShowConfetti(false); }} style={{ padding: "14px 36px", borderRadius: 10, border: "2px solid rgba(255,255,255,0.2)", background: "transparent", color: "#94a3b8", fontWeight: 800, fontSize: "clamp(15px, 2vw, 18px)", cursor: "pointer", letterSpacing: 1 }}>Change Theme</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #070720, #0f0f2e 40%, #0a0a1a)", padding: "clamp(8px, 2vw, 16px) clamp(8px, 2vw, 16px) 80px" }}>
      <div style={{ textAlign: "center", padding: "clamp(8px, 2vw, 16px) 0 clamp(4px, 1vw, 8px)" }}>
        <h1 style={{ fontSize: "clamp(18px, 3vw, 26px)", fontWeight: 900, color: "#f8fafc", margin: 0, letterSpacing: 2, textTransform: "uppercase" }}>{theme.emoji} {theme.name} Jeopardy</h1>
      </div>
      <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap", margin: "8px 0 16px" }}>
        {teams.map((name, i) => (
          <div key={i} style={{ background: activeTeam === i ? TEAM_COLORS[i] + "20" : "rgba(255,255,255,0.04)", borderRadius: 10, padding: "8px clamp(12px, 2vw, 18px)", textAlign: "center", border: activeTeam === i ? "2px solid " + TEAM_COLORS[i] : "1px solid rgba(255,255,255,0.08)", transition: "all 0.3s", minWidth: "clamp(70px, 12vw, 100px)" }}>
            <div style={{ color: TEAM_COLORS[i], fontWeight: 700, fontSize: "clamp(11px, 1.6vw, 14px)", textTransform: "uppercase", letterSpacing: 0.5 }}>{name}</div>
            <div style={{ color: "#f8fafc", fontWeight: 900, fontSize: "clamp(18px, 3vw, 24px)" }}>${scores[i]}</div>
          </div>
        ))}
      </div>
      <div style={{ textAlign: "center", marginBottom: 12 }}>
        <span style={{ color: "#64748b", fontSize: "clamp(13px, 1.8vw, 15px)" }}>Selecting: </span>
        <span style={{ color: TEAM_COLORS[activeTeam], fontWeight: 700, fontSize: "clamp(14px, 2vw, 16px)" }}>{teams[activeTeam]}</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "clamp(4px, 1vw, 8px)", maxWidth: 900, margin: "0 auto" }}>
        {categories.map((cat) => (
          <div key={cat.name} style={{ textAlign: "center", padding: "clamp(8px, 1.5vw, 12px) 4px", borderRadius: 10, background: "linear-gradient(180deg, " + cat.accent + "30, transparent)", borderBottom: "3px solid " + cat.accent }}>
            <div style={{ fontSize: "clamp(18px, 2.5vw, 24px)" }}>{cat.emoji}</div>
            <div style={{ color: cat.accent, fontWeight: 800, fontSize: "clamp(11px, 1.5vw, 15px)", textTransform: "uppercase", letterSpacing: 0.5, lineHeight: 1.3, marginTop: 2 }}>{cat.name}</div>
          </div>
        ))}
        {[0, 1, 2, 3, 4].map((qIdx) =>
          categories.map((cat, catIdx) => {
            const key = catIdx + "-" + qIdx;
            const isAnswered = answered.has(key);
            const q = cat.questions[qIdx];
            return (
              <button key={key} disabled={isAnswered} onClick={() => setActiveQuestion({ catIdx, qIdx, category: cat, questionData: q })}
                style={{ padding: "clamp(10px, 2vw, 18px) 4px", borderRadius: 10, border: isAnswered ? "1px solid rgba(255,255,255,0.03)" : "1px solid " + cat.accent + "30", background: isAnswered ? "rgba(255,255,255,0.02)" : "linear-gradient(160deg, " + cat.color + ", rgba(0,0,0,0.4))", color: isAnswered ? "#334155" : cat.accent, fontWeight: 900, fontSize: "clamp(18px, 3vw, 26px)", fontFamily: "inherit", cursor: isAnswered ? "default" : "pointer", transition: "all 0.2s", opacity: isAnswered ? 0.3 : 1 }}>
                {isAnswered ? "—" : "$" + q.value}
              </button>
            );
          })
        )}
      </div>
      <div style={{ textAlign: "center", marginTop: 16, color: "#334155", fontSize: "clamp(12px, 1.6vw, 14px)" }}>{answered.size} / {totalQuestions} questions answered</div>
      {activeQuestion && <QuestionModal category={activeQuestion.category} questionData={activeQuestion.questionData} onCorrect={handleCorrect} onWrong={handleWrong} onClose={handleClose} teams={teams} activeTeam={activeTeam} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
